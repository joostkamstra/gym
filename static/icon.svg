<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c1c1e"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="fg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#30d158"/>
      <stop offset="1" stop-color="#0a84ff"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <!-- Monogram FH — bold, centered, gradient -->
  <text x="256" y="360" text-anchor="middle"
        font-family="-apple-system,SF Pro Display,Helvetica Neue,Helvetica,Arial,sans-serif"
        font-weight="900" font-size="280" fill="url(#fg)" letter-spacing="-8">FH</text>
</svg>
