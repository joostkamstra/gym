<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000">
<link rel="manifest" href="manifest.json">
<title>Gym Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro',sans-serif;background:#000;color:#fff;
  padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom);min-height:100dvh;
  -webkit-text-size-adjust:100%;overscroll-behavior-x:none}

/* Pull to refresh */
.ptr{text-align:center;color:#636366;font-size:13px;padding:0;height:0;overflow:hidden;
  transition:height .2s,opacity .2s;opacity:0}
.ptr.visible{height:40px;opacity:1;padding:10px 0}
.ptr.refreshing{color:#30d158}

/* Views */
.view{display:none}.view.active{display:block}

/* Header */
.header{padding:16px 0 12px;display:flex;align-items:center;gap:12px}
.header h1{font-size:22px;font-weight:700;flex:1}
.back-btn{font-size:28px;color:#0a84ff;background:none;border:none;cursor:pointer;padding:4px 8px 4px 0}
.header-action{font-size:14px;color:#0a84ff;background:none;border:none;cursor:pointer;font-weight:600;padding:8px}

/* Home */
.home-card{background:#1c1c1e;border-radius:16px;padding:20px;margin-bottom:12px;cursor:pointer;
  display:flex;align-items:center;gap:16px;transition:transform .1s}
.home-card:active{transform:scale(0.97)}
.home-card .icon{font-size:36px;width:56px;height:56px;border-radius:14px;display:flex;
  align-items:center;justify-content:center;flex-shrink:0}
.home-card .icon.a{background:#1a3a1a}
.home-card .icon.b{background:#1a2a3a}
.home-card .icon.c{background:#2a1a2a}
.home-card .icon.d{background:#2a2a1a}
.home-card .icon.hist{background:#2a2a1a}
.home-card h2{font-size:17px;font-weight:600}
.home-card p{font-size:13px;color:#8e8e93;margin-top:2px}
.home-card .arrow{color:#3a3a3c;font-size:20px;margin-left:auto}

/* Stats bar */
.stats-bar{background:#1c1c1e;border-radius:12px;padding:14px 16px;margin-bottom:16px;
  display:flex;justify-content:space-around;text-align:center}
.stats-bar .stat-val{font-size:20px;font-weight:700}
.stats-bar .stat-label{font-size:11px;color:#8e8e93;margin-top:2px}

/* Workout */
.superset{background:#1c1c1e;border-radius:14px;margin-bottom:12px;overflow:hidden}
.superset-header{padding:10px 16px;font-size:12px;font-weight:700;letter-spacing:.5px;
  text-transform:uppercase;display:flex;align-items:center;gap:8px}
.superset-header .badge{background:#2c2c2e;border-radius:6px;padding:2px 8px;font-size:11px;
  color:#aeaeb2;font-weight:500;margin-left:auto}
.superset.green .superset-header{background:#0d3d1a;color:#30d158}
.superset.blue .superset-header{background:#0d2540;color:#0a84ff}
.superset.purple .superset-header{background:#2d1a3d;color:#bf5af2}
.superset.orange .superset-header{background:#3d2a0d;color:#ff9f0a}
.superset.red .superset-header{background:#3d1a1a;color:#ff453a}

.exercise{padding:12px 16px;border-bottom:1px solid #2c2c2e}
.exercise:last-child{border-bottom:none}
.ex-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.ex-name-row{display:flex;align-items:center;gap:6px}
.ex-name{font-size:15px;font-weight:600}
.ex-detail{font-size:12px;color:#8e8e93}
.ex-target{font-size:13px;color:#0a84ff;font-weight:600;flex-shrink:0}

/* Multi-set rows */
.set-row{display:flex;gap:6px;align-items:center;margin-bottom:4px}
.set-row:last-child{margin-bottom:0}
.set-label{font-size:11px;color:#636366;width:20px;text-align:center;font-weight:600;flex-shrink:0}
.ex-input{width:56px;height:38px;background:#2c2c2e;border:2px solid #3a3a3c;border-radius:10px;
  color:#fff;font-size:16px;font-weight:600;text-align:center;-webkit-appearance:none;appearance:none}
.ex-input:focus{border-color:#0a84ff;outline:none}
.ex-input::placeholder{color:#636366;font-weight:400}
.ex-unit{font-size:11px;color:#636366;width:20px}
.ex-x{font-size:13px;color:#636366}

/* Info button */
.info-btn{background:none;border:none;color:#636366;font-size:16px;cursor:pointer;padding:2px 4px;
  line-height:1;border-radius:50%;flex-shrink:0}
.info-btn:active{color:#0a84ff}

/* Swap button */
.swap-btn{background:none;border:1px solid #3a3a3c;color:#8e8e93;font-size:13px;cursor:pointer;
  padding:2px 8px;border-radius:8px;flex-shrink:0;line-height:1.2}
.swap-btn:active{color:#0a84ff;border-color:#0a84ff}
.swap-btn.swapped{color:#ff9f0a;border-color:#ff9f0a}

/* Exercise info modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:200;
  display:none;align-items:flex-end;justify-content:center;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}
.modal-overlay.open{display:flex}
.modal-sheet{background:#1c1c1e;border-radius:20px 20px 0 0;width:100%;max-width:500px;
  max-height:70vh;overflow-y:auto;padding:20px 20px env(safe-area-inset-bottom);
  animation:slideUp .25s ease-out}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:5px;background:#3a3a3c;border-radius:3px;margin:0 auto 16px;
  padding:10px 40px;background-clip:content-box;cursor:pointer}
.modal-title{font-size:19px;font-weight:700;margin-bottom:4px}
.modal-muscles{font-size:13px;color:#8e8e93;margin-bottom:16px}
.modal-section{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.modal-section.do{color:#30d158}
.modal-section.dont{color:#ff453a}
.do-list,.dont-list{list-style:none;margin-bottom:16px}
.do-list li,.dont-list li{font-size:14px;padding:6px 0;padding-left:20px;position:relative;line-height:1.4}
.do-list li::before{content:'✓';position:absolute;left:0;color:#30d158;font-weight:700}
.dont-list li::before{content:'✗';position:absolute;left:0;color:#ff453a;font-weight:700}
.modal-close{width:100%;padding:14px;border-radius:12px;font-size:16px;font-weight:600;
  background:#2c2c2e;color:#fff;border:none;cursor:pointer;margin-top:4px}

/* Feedback textarea */
.feedback-area{width:100%;background:#1c1c1e;border:2px solid #3a3a3c;border-radius:14px;
  color:#fff;font-size:14px;font-family:inherit;padding:12px 16px;resize:vertical;min-height:80px;
  margin-bottom:12px;-webkit-appearance:none;appearance:none}
.feedback-area:focus{border-color:#0a84ff;outline:none}
.feedback-area::placeholder{color:#636366}

/* Feedback display in detail */
.detail-feedback{background:#1c1c1e;border-radius:12px;padding:14px 16px;margin-bottom:8px;
  border-left:3px solid #ff9f0a}
.detail-feedback-label{font-size:12px;color:#ff9f0a;font-weight:600;text-transform:uppercase;
  letter-spacing:.5px;margin-bottom:4px}
.detail-feedback-text{font-size:14px;color:#aeaeb2;line-height:1.5}

/* Rest indicator */
.rest-tag{font-size:11px;color:#636366;text-align:center;padding:4px 0}

/* Bottom actions */
.bottom-bar{position:sticky;bottom:0;padding:12px 0 20px;background:linear-gradient(transparent,#000 20%)}
.btn{width:100%;padding:16px;border-radius:14px;font-size:17px;font-weight:600;border:none;
  cursor:pointer;transition:transform .1s}
.btn:active{transform:scale(0.97)}
.btn-green{background:#30d158;color:#000}
.btn-blue{background:#0a84ff;color:#fff}
.btn-outline{background:transparent;border:2px solid #3a3a3c;color:#fff}
.btn+.btn{margin-top:8px}

/* History */
.hist-item{background:#1c1c1e;border-radius:12px;padding:14px 16px;margin-bottom:8px;
  display:flex;align-items:center;cursor:pointer;transition:transform .1s}
.hist-item:active{transform:scale(0.97)}
.hist-date{font-size:15px;font-weight:600;flex:1}
.hist-schema{font-size:13px;color:#8e8e93;margin-left:8px}
.hist-arrow{color:#3a3a3c;font-size:16px;margin-left:8px}
.empty-state{text-align:center;padding:60px 20px;color:#636366}
.empty-state .emoji{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:15px}

/* Detail */
.detail-exercise{background:#1c1c1e;border-radius:12px;padding:14px 16px;margin-bottom:8px}
.detail-name{font-size:15px;font-weight:600;margin-bottom:6px}
.detail-sets-table{width:100%}
.detail-set-row{display:flex;gap:8px;align-items:center;padding:2px 0}
.detail-set-label{font-size:11px;color:#636366;width:22px;font-weight:600}
.detail-set-val{font-size:14px}
.detail-set-val span{color:#8e8e93}
.detail-vals{display:flex;gap:16px}
.detail-val{font-size:14px}
.detail-val span{color:#8e8e93}

/* Share */
.share-preview{background:#1c1c1e;border-radius:12px;padding:16px;margin:12px 0;
  font-family:monospace;font-size:13px;color:#aeaeb2;white-space:pre-wrap;line-height:1.6}

/* Timer toast */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#2c2c2e;
  color:#fff;padding:10px 20px;border-radius:12px;font-size:14px;font-weight:600;
  opacity:0;transition:opacity .3s;pointer-events:none;z-index:100}
.toast.show{opacity:1}

/* Login */
.login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:80vh;padding:20px;text-align:center}
.login-icon{font-size:64px;margin-bottom:16px}
.login-title{font-size:28px;font-weight:700;margin-bottom:8px}
.login-subtitle{font-size:15px;color:#8e8e93;margin-bottom:32px}
.login-input{width:100%;max-width:280px;height:52px;background:#1c1c1e;border:2px solid #3a3a3c;
  border-radius:14px;color:#fff;font-size:18px;font-weight:600;text-align:center;
  -webkit-appearance:none;appearance:none;letter-spacing:8px;margin-bottom:12px}
.login-input:focus{border-color:#0a84ff;outline:none}
.login-input::placeholder{color:#636366;letter-spacing:normal;font-weight:400;font-size:15px}
.login-error{color:#ff453a;font-size:13px;min-height:20px;margin-bottom:12px}
.login-users{display:flex;gap:12px;margin-bottom:24px}
.login-user{background:#1c1c1e;border:2px solid #3a3a3c;border-radius:12px;padding:12px 24px;
  color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:all .15s}
.login-user.active{border-color:#0a84ff;background:#0d2540}
.login-user:active{transform:scale(0.95)}

/* Cloud indicator */
.cloud-badge{font-size:11px;color:#30d158;background:#0d3d1a;padding:2px 8px;border-radius:6px;
  font-weight:600;margin-left:8px}

/* Equipment browser */
.search-input{width:100%;background:#1c1c1e;border:2px solid #3a3a3c;border-radius:12px;
  color:#fff;font-size:15px;padding:10px 16px;margin-bottom:12px;-webkit-appearance:none}
.search-input:focus{border-color:#0a84ff;outline:none}
.search-input::placeholder{color:#636366}
.equip-item{background:#1c1c1e;border-radius:12px;padding:14px 16px;margin-bottom:4px;
  cursor:pointer;transition:transform .1s}
.equip-item:active{transform:scale(0.97)}
.equip-item.expanded{border-left:3px solid #0a84ff;margin-bottom:8px}
.equip-name{font-size:15px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
.equip-meta{font-size:12px;color:#8e8e93;margin-top:2px}
.equip-count{font-size:11px;color:#8e8e93;background:#2c2c2e;padding:2px 8px;border-radius:6px;flex-shrink:0}
.equip-exercises{margin-top:10px;padding-top:10px;border-top:1px solid #2c2c2e}
.equip-ex-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0}
.equip-ex-row:not(:last-child){border-bottom:1px solid #2c2c2e}
.equip-ex-name{font-size:14px;font-weight:600}
.equip-ex-muscles{font-size:12px;color:#8e8e93;margin-top:1px}
.home-card .icon.equip{background:#2a1a1a}

/* Progress */
.modal-progress{margin-top:8px;margin-bottom:16px}
.progress-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;
  color:#0a84ff;margin-bottom:10px}
.progress-loading{font-size:13px;color:#636366;text-align:center;padding:12px 0}
.progress-bars{display:flex;align-items:flex-end;gap:3px;height:60px;margin-bottom:8px;
  padding:0 2px;border-bottom:1px solid #2c2c2e}
.progress-bar{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:2px}
.progress-bar-fill{width:100%;border-radius:3px 3px 0 0;min-height:2px}
.progress-bar-fill.up{background:#30d158}
.progress-bar-fill.down{background:#ff453a}
.progress-bar-fill.stable{background:#636366}
.progress-bar-fill.first{background:#0a84ff}
.progress-bar-label{font-size:9px;color:#8e8e93;white-space:nowrap}
.progress-table{width:100%}
.progress-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;
  border-bottom:1px solid #2c2c2e;font-size:13px}
.progress-row:last-child{border-bottom:none}
.progress-date{color:#8e8e93;width:70px;flex-shrink:0}
.progress-set{font-weight:600;flex:1}
.progress-delta{width:50px;text-align:right;font-weight:600;flex-shrink:0}
.progress-delta.up{color:#30d158}
.progress-delta.down{color:#ff453a}
.progress-delta.stable{color:#636366}
.progress-empty{font-size:13px;color:#636366;text-align:center;padding:16px 0}

/* Evaluation after workout */
.eval-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:300;
  display:none;align-items:flex-end;justify-content:center;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}
.eval-overlay.open{display:flex}
.eval-sheet{background:#1c1c1e;border-radius:20px 20px 0 0;width:100%;max-width:500px;
  max-height:85vh;overflow-y:auto;padding:20px 20px env(safe-area-inset-bottom);animation:slideUp .3s ease-out}
.eval-header{text-align:center;margin-bottom:16px}
.eval-title{font-size:20px;font-weight:700}
.eval-subtitle{font-size:13px;color:#8e8e93;margin-top:4px}
.eval-summary{background:#2c2c2e;border-radius:12px;padding:14px;text-align:center;margin-bottom:16px;
  font-size:15px;font-weight:600}
.eval-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid #2c2c2e}
.eval-item:last-child{border-bottom:none}
.eval-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:700;flex-shrink:0}
.eval-icon.up{background:#0d3d1a;color:#30d158}
.eval-icon.down{background:#3d1a1a;color:#ff453a}
.eval-icon.stable{background:#2c2c2e;color:#636366}
.eval-icon.new{background:#0d2540;color:#0a84ff}
.eval-name{font-size:14px;font-weight:600;flex:1}
.eval-detail{font-size:12px;color:#8e8e93;text-align:right}
.eval-change{font-size:13px;font-weight:600;text-align:right}
.eval-change.up{color:#30d158}
.eval-change.down{color:#ff453a}
.eval-change.stable{color:#636366}
.eval-change.new{color:#0a84ff}

</style>
</head>
<body>

<!-- LOGIN VIEW -->
<div id="login" class="view active">
  <div class="login-wrap">
    <div class="login-icon">🏋️</div>
    <div class="login-title">Gym Tracker</div>
    <div class="login-subtitle">Kies je profiel en voer je PIN in</div>
    <div class="login-users" id="loginUsers"></div>
    <input type="password" inputmode="numeric" pattern="[0-9]*" maxlength="6"
      class="login-input" id="loginPin" placeholder="PIN code"
      onkeydown="if(event.key==='Enter')doLogin()">
    <div class="login-error" id="loginError"></div>
    <button class="btn btn-green" style="max-width:280px" onclick="doLogin()">Inloggen</button>
  </div>
</div>

<!-- HOME VIEW -->
<div id="home" class="view">
  <div class="ptr" id="ptr">↓ Pull to refresh</div>
  <div class="header">
    <h1 id="homeTitle">Gym Tracker</h1>
    <button class="header-action" onclick="doRefresh()">↻</button>
    <button class="header-action" onclick="logout()" title="Uitloggen">⏻</button>
  </div>
  <div class="stats-bar" id="statsBar">
    <div><div class="stat-val" id="statWorkouts">0</div><div class="stat-label">workouts</div></div>
    <div><div class="stat-val" id="statStreak">0</div><div class="stat-label">deze week</div></div>
    <div><div class="stat-val" id="statLast">—</div><div class="stat-label">laatste</div></div>
  </div>

  <div id="homeCards"></div>
</div>

<!-- WORKOUT VIEW -->
<div id="workout" class="view">
  <div class="header">
    <button class="back-btn" onclick="confirmExit()">‹</button>
    <h1 id="workoutTitle"></h1>
  </div>
  <div id="workoutExercises"></div>
  <textarea id="workoutFeedback" class="feedback-area" rows="3"
    placeholder="Opmerkingen (optioneel) — bijv. schouder voelde strak, squat diepte was beter..."></textarea>
  <div class="bottom-bar">
    <button class="btn btn-green" onclick="saveWorkout()">Workout opslaan</button>
  </div>
</div>

<!-- HISTORY VIEW -->
<div id="history" class="view">
  <div class="header">
    <button class="back-btn" onclick="showView('home')">‹</button>
    <h1>Geschiedenis</h1>
  </div>
  <div id="historyList"></div>
</div>

<!-- DETAIL VIEW -->
<div id="detail" class="view">
  <div class="header">
    <button class="back-btn" onclick="showView('history')">‹</button>
    <h1 id="detailTitle"></h1>
    <button class="header-action" onclick="shareWorkout()">Deel</button>
  </div>
  <div id="detailContent"></div>
  <div style="padding:20px 0">
    <button class="btn btn-outline" style="color:#ff453a;border-color:#ff453a" onclick="deleteWorkout()">Verwijder workout</button>
  </div>
</div>

<!-- SHARE VIEW -->
<div id="share" class="view">
  <div class="header">
    <button class="back-btn" onclick="showView('detail')">‹</button>
    <h1>Deel resultaten</h1>
  </div>
  <p style="color:#8e8e93;font-size:14px;margin-bottom:8px">Kopieer en plak in de Claude chat:</p>
  <div class="share-preview" id="sharePreview"></div>
  <button class="btn btn-blue" onclick="copyToClipboard()">Kopieer naar klembord</button>
</div>

<!-- EQUIPMENT VIEW -->
<div id="equipment" class="view">
  <div class="header">
    <button class="back-btn" onclick="showView('home')">&#8249;</button>
    <h1>Apparatuur</h1>
  </div>
  <input class="search-input" type="text" placeholder="Zoek apparaat of oefening..." id="equipSearch" oninput="filterEquipment(this.value)">
  <div id="equipmentList"></div>
</div>

<!-- EXERCISE INFO MODAL -->
<div class="modal-overlay" id="exerciseModal" onclick="closeExerciseInfo(event)">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle" onclick="closeExerciseInfo()"></div>
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-muscles" id="modalMuscles"></div>
    <div class="modal-section do">DO's</div>
    <ul class="do-list" id="modalDos"></ul>
    <div class="modal-section dont">DON'Ts</div>
    <ul class="dont-list" id="modalDonts"></ul>
    <div class="modal-progress" id="modalProgress"></div>
    <button class="modal-close" onclick="closeExerciseInfo()">Sluiten</button>
  </div>
</div>

<!-- EVALUATION OVERLAY -->
<div class="eval-overlay" id="evalOverlay" onclick="closeEvaluation(event)">
  <div class="eval-sheet" onclick="event.stopPropagation()">
    <div class="eval-header">
      <div class="eval-title" id="evalTitle">Evaluatie</div>
      <div class="eval-subtitle" id="evalSubtitle"></div>
    </div>
    <div class="eval-summary" id="evalSummary"></div>
    <div id="evalItems"></div>
    <button class="btn btn-green" style="margin-top:16px" onclick="closeEvaluation()">Top! Naar home</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// === EXERCISE INFO ===
const EXERCISE_INFO = {
  'Barbell Squat': {
    muscles: 'Quadriceps, glutes, core',
    dos: ['Voeten schouderbreedte, tenen licht naar buiten', 'Daal tot minstens 90° kniehoek', 'Borst omhoog, rug neutraal houden', 'Knieën in lijn met tenen duwen (track over 2e/3e teen)'],
    donts: ['Knieën niet naar binnen laten vallen', 'Niet op je tenen leunen', 'Geen bouncing onderaan']
  },
  'Pull-ups': {
    muscles: 'Lats, biceps, middenrug',
    dos: ['Volledige ROM: hang tot kin boven stang', 'Schouderbladen naar beneden trekken bij start', 'Gecontroleerd laten zakken (negatief)'],
    donts: ['Niet kip-achtig swingen/kippen', 'Niet halverwege stoppen', 'Geen overmatig momentum gebruiken']
  },

// === API CLIENT ===
const API_BASE = location.origin;
let authToken = localStorage.getItem('gym_token');
let authUser = JSON.parse(localStorage.getItem('gym_auth_user') || 'null');
let cloudSchemas = null; // cached from API
let cloudMode = !!authToken;

async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  if (authToken) headers['Authorization'] = 'Bearer ' + authToken;
  const res = await fetch(API_BASE + path, { ...opts, headers });
  if (res.status === 401) { logout(); throw new Error('Unauthorized'); }
  if (!res.ok) throw new Error(`API ${res.status}`);
  if (res.status === 204) return null;
  return res.json();
}

function logout() {
  authToken = null; authUser = null; cloudSchemas = null; cloudMode = false;
  localStorage.removeItem('gym_token');
  localStorage.removeItem('gym_auth_user');
  showView('login');
  renderLoginUsers();
}

async function doLogin() {
  const pin = document.getElementById('loginPin').value;
  const errEl = document.getElementById('loginError');
  const selectedUser = document.querySelector('.login-user.active');
  if (!selectedUser) { errEl.textContent = 'Kies eerst een profiel'; return; }
  if (!pin) { errEl.textContent = 'Voer je PIN in'; return; }
  errEl.textContent = '';
  try {
    const data = await api('/api/auth/login', {
      method: 'POST',
      body: JSON.stringify({ username: selectedUser.dataset.user, pin })
    });
    authToken = data.token;
    authUser = data.user;
    cloudMode = true;
    localStorage.setItem('gym_token', authToken);
    localStorage.setItem('gym_auth_user', JSON.stringify(authUser));
    currentUser = authUser.username;
    localStorage.setItem('gym_user', currentUser);
    document.getElementById('loginPin').value = '';
    await loadCloudSchemas();
    showView('home');
    renderHome();
    updateStats();
  } catch (e) {
    errEl.textContent = 'Onjuiste PIN of gebruiker';
  }
}

function renderLoginUsers() {
  const c = document.getElementById('loginUsers');
  c.textContent = '';
  // Show known users (from USERS constant as fallback, or just joost/ruud)
  const users = Object.keys(USERS);
  users.forEach(u => {
    const btn = document.createElement('button');
    btn.className = 'login-user';
    btn.dataset.user = u;
    btn.textContent = USERS[u].name;
    btn.onclick = () => {
      document.querySelectorAll('.login-user').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('loginPin').focus();
    };
    c.appendChild(btn);

}

async function loadCloudSchemas() {
  if (!cloudMode) return;
  try {
    const data = await api('/api/schemas');
    if (data.schemas && data.schemas.length > 0) {
      cloudSchemas = {};
      data.schemas.forEach(s => {
        cloudSchemas[s.key] = { name: s.name, subtitle: s.subtitle, desc: s.description, supersets: s.data.supersets || s.data };
      });
    } else {
      // No schemas in cloud yet — auto-import from local USERS data
      const localSchemas = USERS[currentUser]?.schemas;
      if (localSchemas) {
        console.log('No cloud schemas found, importing from local data...');
        const importData = {};
        Object.entries(localSchemas).forEach(([key, s]) => {
          importData[key] = { key, name: s.name, subtitle: s.subtitle, desc: s.desc, supersets: s.supersets };
        });
        await api('/api/schemas/import', { method: 'POST', body: JSON.stringify({ schemas: importData }) });
        console.log('Schemas imported to cloud');
        // Reload
        return loadCloudSchemas();
      }
    }
  } catch (e) {
    console.log('Cloud schemas unavailable, using local');
    cloudSchemas = null;
  }
}

const SCHEMA_DISPLAY = { A: {emoji:'\ud83d\udcaa',cls:'a'}, B: {emoji:'\ud83d\udd25',cls:'b'}, C: {emoji:'\ud83c\udfcb\ufe0f',cls:'c'}, D: {emoji:'\u26a1',cls:'d'} };

function getTodaySchema(dayOfWeek) {
  // Mon(1)=A or C, Thu(4)=B or D. Rotation based on last workout.
  const isMon = dayOfWeek === 1;
  const isThu = dayOfWeek === 4;
  if (!isMon && !isThu) return null;

  // Check last workout to determine rotation
  const workouts = cloudWorkouts || getWorkouts();
  if (!workouts || !workouts.length) return isMon ? 'A' : 'B';

  const lastSchema = workouts[0].schema_key || workouts[0].schema;
  if (isMon) return (lastSchema === 'A' || lastSchema === 'B') ? 'C' : 'A';
  if (isThu) return (lastSchema === 'A' || lastSchema === 'B') ? 'B' : 'D';
  return null;
}

// Cloud workout save
async function saveWorkoutToCloud(workout, schemaKey) {
  if (!cloudMode) return null;
  try {
    const sets = [];
    workout.exercises.forEach(ex => {
      if (Array.isArray(ex.sets)) {
        ex.sets.forEach((s, i) => {
          if (s.kg || s.reps) {
            sets.push({
              exercise_name: ex.name,
              superset_key: ex.id,
              set_number: i + 1,
              kg: parseFloat(s.kg) || 0,
              reps: parseInt(s.reps) || 0,
              target_kg: ex.target_kg || null,
              target_reps: null
            });
          }
        });
      }
    });
    const res = await api('/api/workouts', {
      method: 'POST',
      body: JSON.stringify({
        schema_key: schemaKey,
        date: workout.date,
        feedback: workout.feedback,
        notes: null,
        sets
      })
    });
    console.log('Workout saved to cloud:', res.id);
    if (res.target_updates && res.target_updates.length) {
      window._lastTargetUpdates = res.target_updates;
      console.log('Targets auto-updated:', res.target_updates.length, 'changes');
    }
    return res;
  } catch (e) {
    console.log('Cloud save failed, data saved locally:', e.message);
    return null;
  }
}

// === EXERCISE PROGRESS ===
let progressCache = {};

async function loadExerciseProgress(name) {
  if (progressCache[name]) return progressCache[name];
  if (!cloudMode) return null;
  try {
    const data = await api('/api/workouts/progress/' + encodeURIComponent(name));
    const byDate = {};
    data.data_points.forEach(p => {
      const d = p.date.split('T')[0];
      const ex = byDate[d];
      if (!ex || p.kg > ex.kg || (p.kg === ex.kg && p.reps > ex.reps)) {
        byDate[d] = { date: d, kg: p.kg, reps: p.reps };
      }
    });
    const sessions = Object.values(byDate).sort((a, b) => a.date.localeCompare(b.date));
    progressCache[name] = sessions;
    return sessions;
  } catch (e) {
    return null;
  }
}

function renderProgressInto(container, sessions) {
  container.textContent = '';
  if (!sessions || !sessions.length) {
    const empty = document.createElement('div');
    empty.className = 'progress-empty';
    empty.textContent = 'Nog geen progressie data';
    container.appendChild(empty);
    return;
  }
  const recent = sessions.slice(-8);
  const maxKg = Math.max(...recent.map(s => s.kg)) || 1;
  const minKg = Math.min(...recent.map(s => s.kg));
  const range = maxKg - minKg || 1;

  const title = document.createElement('div');
  title.className = 'progress-title';
  title.textContent = 'PROGRESSIE';
  container.appendChild(title);

  // Bar chart
  const barsDiv = document.createElement('div');
  barsDiv.className = 'progress-bars';
  recent.forEach((s, i) => {
    const pct = Math.max(10, ((s.kg - minKg) / range) * 80 + 20);
    let cls = 'first';
    if (i > 0) {
      const prev = recent[i - 1];
      cls = s.kg > prev.kg ? 'up' : s.kg < prev.kg ? 'down' : (s.reps > prev.reps ? 'up' : s.reps < prev.reps ? 'down' : 'stable');
    }
    const bar = document.createElement('div');
    bar.className = 'progress-bar';
    const fill = document.createElement('div');
    fill.className = 'progress-bar-fill ' + cls;
    fill.style.height = pct + '%';
    const label = document.createElement('div');
    label.className = 'progress-bar-label';
    label.textContent = s.date.slice(5);
    bar.appendChild(fill);
    bar.appendChild(label);
    barsDiv.appendChild(bar);
  });
  container.appendChild(barsDiv);

  // Table
  const table = document.createElement('div');
  table.className = 'progress-table';
  const rev = [...recent].reverse();
  rev.forEach((s, i) => {
    const prev = rev[i + 1];
    let delta = '', cls = '';
    if (prev) {
      const kgD = s.kg - prev.kg, rD = s.reps - prev.reps;
      if (kgD > 0) { delta = '+' + kgD + 'kg'; cls = 'up'; }
      else if (kgD < 0) { delta = kgD + 'kg'; cls = 'down'; }
      else if (rD > 0) { delta = '+' + rD + 'r'; cls = 'up'; }
      else if (rD < 0) { delta = rD + 'r'; cls = 'down'; }
      else { delta = '='; cls = 'stable'; }
    }
    const row = document.createElement('div');
    row.className = 'progress-row';
    const dateEl = document.createElement('div');
    dateEl.className = 'progress-date';
    dateEl.textContent = s.date.slice(5).replace('-', '/');
    const setEl = document.createElement('div');
    setEl.className = 'progress-set';
    setEl.textContent = s.kg + ' kg \u00d7 ' + s.reps;
    const deltaEl = document.createElement('div');
    deltaEl.className = 'progress-delta ' + cls;
    deltaEl.textContent = delta;
    row.appendChild(dateEl);
    row.appendChild(setEl);
    row.appendChild(deltaEl);
    table.appendChild(row);
  });
  container.appendChild(table);
}

// === SWAP HELPERS ===
function getResolvedEx(ex) {
  if (currentSwaps[ex.id] && ex.alt) {
    return { ...ex, name: ex.alt.name, detail: ex.alt.detail || ex.detail,
      target_kg: ex.alt.target_kg, target_label: ex.alt.target_label || null,
      target_sets: ex.alt.target_sets };
  }
  return ex;
}

function renderExerciseInner(ex, numSets) {
  const resolved = getResolvedEx(ex);
  const targetStr = resolved.target_label || (resolved.target_kg > 0 ? resolved.target_kg + ' kg' : 'BW');
  const hasInfo = EXERCISE_INFO[resolved.name];
  const isSwapped = currentSwaps[ex.id];

  let html = `<div class="ex-top">
    <div>
      <div class="ex-name-row">
        <div class="ex-name">${resolved.name}</div>
        ${hasInfo ? `<button class="info-btn" onclick="showExerciseInfo('${resolved.name.replace(/'/g, "\\'")}')">ⓘ</button>` : ''}
        ${ex.alt ? `<button class="swap-btn${isSwapped ? ' swapped' : ''}" onclick="toggleSwap('${ex.id}',${numSets})">⇄</button>` : ''}
      </div>
      <div class="ex-detail">${resolved.detail}</div>
    </div>
    <div class="ex-target">Doel: ${targetStr}</div>
  </div>`;

  for (let si = 0; si < numSets; si++) {
    const tgt = resolved.target_sets?.[si] || {};
    const fillKg = tgt.kg !== undefined ? tgt.kg : '';
    const fillReps = tgt.reps !== undefined ? tgt.reps : '';
    html += `<div class="set-row">
      <div class="set-label">S${si + 1}</div>
      <input class="ex-input" type="number" inputmode="decimal" id="kg_${ex.id}_${si}"
        placeholder="${resolved.target_kg || '—'}" value="${fillKg}"
        oninput="autoSave('${ex.id}',${numSets})">
      <div class="ex-unit">kg</div>
      <div class="ex-x">×</div>
      <input class="ex-input" type="number" inputmode="numeric" id="reps_${ex.id}_${si}"
        placeholder="—" value="${fillReps}"
        oninput="autoSave('${ex.id}',${numSets})">
      <div class="ex-unit">reps</div>
    </div>`;
  }
  return html;
}

function toggleSwap(id, numSets) {
  currentSwaps[id] = !currentSwaps[id];
  const container = document.getElementById('ex-wrap-' + id);
  if (!container) return;
  const s = getUserSchemas()[currentSchema];
  for (const ss of s.supersets) {
    for (const ex of ss.exercises) {
      if (ex.id === id) {
        container.innerHTML = renderExerciseInner(ex, ss.sets);
        return;
      }
    }
  }
}

// === WORKOUT ===
function startWorkout(schema) {
  currentSchema = schema;
  currentWorkout = {};
  currentSwaps = {};
  const s = getUserSchemas()[schema];

  document.getElementById('workoutTitle').textContent = s.name;
  document.getElementById('workoutFeedback').value = '';

  let html = '';
  s.supersets.forEach(ss => {
    html += `<div class="superset ${ss.color}">`;
    html += `<div class="superset-header">${ss.name}<span class="badge">${ss.sets} sets • ${ss.rest} rust</span></div>`;
    if (ss.warmup) {
      html += `<div style="padding:6px 16px;font-size:12px;color:#8e8e93;font-style:italic">Warmup: ${ss.warmup}</div>`;
    }
    ss.exercises.forEach(ex => {
      html += `<div class="exercise" id="ex-wrap-${ex.id}">`;
      html += renderExerciseInner(ex, ss.sets);
      html += '</div>';
    });
    html += '</div>';
  });

  document.getElementById('workoutExercises').innerHTML = html;
  showView('workout');
}

function autoSave(id, numSets) {
  const sets = [];
  for (let i = 0; i < numSets; i++) {
    const kg = document.getElementById('kg_' + id + '_' + i)?.value || '';
    const reps = document.getElementById('reps_' + id + '_' + i)?.value || '';
    sets.push({ kg, reps });
  }
  currentWorkout[id] = sets;
}

function confirmExit() {
  const hasData = Object.values(currentWorkout).some(sets =>
    Array.isArray(sets) && sets.some(s => s.kg || s.reps)
  );
  if (hasData) {
    if (confirm('Workout afsluiten zonder opslaan?')) showView('home');
  } else {
    showView('home');
  }
}

async function saveWorkout() {
  const s = getUserSchemas()[currentSchema];
  const exercises = [];
  let hasAny = false;

  s.supersets.forEach(ss => {
    ss.exercises.forEach(ex => {
      const resolved = getResolvedEx(ex);
      const sets = [];
      for (let i = 0; i < ss.sets; i++) {
        const kg = document.getElementById('kg_' + ex.id + '_' + i)?.value || '';
        const reps = document.getElementById('reps_' + ex.id + '_' + i)?.value || '';
        if (kg || reps) hasAny = true;
        sets.push({ kg, reps });
      }
      exercises.push({
        id: ex.id,
        name: resolved.name,
        target_kg: resolved.target_kg,
        target_label: resolved.target_label || null,
        sets: sets
      });
    });
  });

  if (!hasAny) {
    showToast('Vul minimaal 1 oefening in');
    return;
  }

  if (!confirm('Workout opslaan?')) return;

  const feedback = document.getElementById('workoutFeedback').value.trim();

  const workout = {
    date: new Date().toISOString(),
    schema: currentSchema,
    schemaName: s.name,
    feedback: feedback || null,
    exercises: exercises
  };

  const workouts = getWorkouts();
  workouts.unshift(workout);
  saveWorkouts(workouts);

  // Save to cloud and show evaluation
  const cloudResult = await saveWorkoutToCloud(workout, currentSchema);
  if (cloudResult && cloudResult.queued) {
    // Offline: queued in service worker
    showToast('Offline opgeslagen \u2014 synct automatisch');
    registerSync();
    setTimeout(() => showView('home'), 1200);
  } else if (cloudResult && cloudResult.id) {
    showToast('Workout opgeslagen!');
    showView('home');
    showWorkoutEvaluation(cloudResult.id, s.name);
  } else {
    showToast('Opgeslagen (lokaal)');
    setTimeout(() => showView('home'), 800);
  }
}

let cloudWorkouts = null; // cached from API

async function loadCloudWorkouts() {
  if (!cloudMode) return null;
  try {
    const data = await api('/api/workouts?page_size=100');
    cloudWorkouts = data.workouts;
    return cloudWorkouts;
  } catch (e) { return null; }
}

function mergeWorkouts() {
  // Cloud workouts take priority, fall back to localStorage
  const local = getWorkouts();
  if (cloudMode && cloudWorkouts && cloudWorkouts.length) {
    // Convert cloud format to display format
    return cloudWorkouts.map(w => ({
      _cloudId: w.id,
      date: w.date,
      schema: w.schema_key,
      schemaName: w.schema_name,
      feedback: w.feedback,
      exercises: groupCloudSets(w.sets)
    }));
  }
  return local;
}

function groupCloudSets(sets) {
  // Group flat sets array into exercises with nested sets (for detail view)
  const byEx = {};
  sets.forEach(s => {
    const key = s.exercise_name;
    if (!byEx[key]) byEx[key] = { name: s.exercise_name, target_kg: s.target_kg || 0, sets: [] };
    byEx[key].sets.push({ kg: s.kg, reps: s.reps });
  });
  return Object.values(byEx);
}

    p.textContent = 'Nog geen workouts. Start je eerste training!';
    empty.appendChild(emoji);
    empty.appendChild(p);
    container.appendChild(empty);
    return;
  }

  workouts.forEach((w, i) => {
    const d = new Date(w.date);
    const dateStr = d.toLocaleDateString('nl-NL', { weekday: 'short', day: 'numeric', month: 'short' });
    const item = document.createElement('div');
    item.className = 'hist-item';
    item.onclick = () => showDetail(i, workouts);
    const dateEl = document.createElement('div');
    dateEl.className = 'hist-date';
    dateEl.textContent = dateStr;
    const schemaEl = document.createElement('div');
    schemaEl.className = 'hist-schema';
    schemaEl.textContent = w.schemaName || ('Schema ' + w.schema);
    const arrow = document.createElement('div');
    arrow.className = 'hist-arrow';
    arrow.textContent = '\u203a';
    item.appendChild(dateEl);
    item.appendChild(schemaEl);
    item.appendChild(arrow);
    container.appendChild(item);
  });
}

function showDetail(index, workouts) {
  if (!workouts) workouts = mergeWorkouts();
  viewingWorkout = workouts[index];
  viewingIndex = index;
  const w = viewingWorkout;
  const d = new Date(w.date);

  document.getElementById('detailTitle').textContent =
    d.toLocaleDateString('nl-NL', { weekday: 'long', day: 'numeric', month: 'long' });

  const content = document.getElementById('detailContent');
  content.textContent = '';

  if (w.feedback) {
    const fb = document.createElement('div');
    fb.className = 'detail-feedback';
    const fbLabel = document.createElement('div');
    fbLabel.className = 'detail-feedback-label';
    fbLabel.textContent = 'Opmerkingen';
    const fbText = document.createElement('div');
    fbText.className = 'detail-feedback-text';
    fbText.textContent = w.feedback;
    fb.appendChild(fbLabel);
    fb.appendChild(fbText);
    content.appendChild(fb);
  }

  (w.exercises || []).forEach(logged => {
    // Derive target from target_kg, or from max kg in sets as fallback
    let tkg = logged.target_kg;
    if (!tkg && logged.sets && logged.sets.length) {
      tkg = Math.max(...logged.sets.map(s => s.kg || 0));
    }
    const targetStr = logged.target_label || (tkg > 0 ? tkg + ' kg' : 'BW');
    const exName = logged.name || 'Unknown';

    if (Array.isArray(logged.sets)) {
      const filledSets = logged.sets.filter(s => s.kg || s.reps);
      if (filledSets.length === 0) return;
      const exDiv = document.createElement('div');
      exDiv.className = 'detail-exercise';
      const nameDiv = document.createElement('div');
      nameDiv.className = 'detail-name';
      nameDiv.textContent = exName;
      const goalSpan = document.createElement('span');
      goalSpan.style.cssText = 'color:#636366;font-size:12px;font-weight:400;margin-left:8px';
      goalSpan.textContent = 'doel: ' + targetStr;
      nameDiv.appendChild(goalSpan);
      exDiv.appendChild(nameDiv);
      const table = document.createElement('div');
      table.className = 'detail-sets-table';
      logged.sets.forEach((s, i) => {
        if (!s.kg && !s.reps) return;
        const row = document.createElement('div');
        row.className = 'detail-set-row';
        const label = document.createElement('div');
        label.className = 'detail-set-label';
        label.textContent = 'S' + (i + 1);
        const kgVal = document.createElement('div');
        kgVal.className = 'detail-set-val';
        kgVal.textContent = (s.kg || '\u2014') + ' kg';
        const repsVal = document.createElement('div');
        repsVal.className = 'detail-set-val';
        repsVal.textContent = (s.reps || '\u2014') + ' reps';
        row.appendChild(label);
        row.appendChild(kgVal);
        row.appendChild(repsVal);
        table.appendChild(row);
      });
      exDiv.appendChild(table);
      content.appendChild(exDiv);
    }
  });

  showView('detail');
}

// === DELETE ===
async function deleteWorkout() {
  if (!confirm('Workout verwijderen?')) return;
  if (cloudMode && viewingWorkout && viewingWorkout._cloudId) {
    try {
      await api('/api/workouts/' + viewingWorkout._cloudId, { method: 'DELETE' });
    } catch (e) { console.log('Cloud delete failed:', e); }
  }
  const workouts = getWorkouts();
  if (viewingIndex > -1 && viewingIndex < workouts.length) {
    workouts.splice(viewingIndex, 1);
    saveWorkouts(workouts);
  }
  showToast('Verwijderd');
  showView('history');
}

// === OFFLINE SYNC ===
function registerSync() {
  if ('serviceWorker' in navigator && 'SyncManager' in window) {
    navigator.serviceWorker.ready.then(reg => reg.sync.register('sync-workouts'));
  } else {
    // Fallback: try to sync immediately on visibility change
    document.addEventListener('visibilitychange', function syncOnFocus() {
      if (document.visibilityState === 'visible') {
        navigator.serviceWorker.controller?.postMessage('SYNC_NOW');
        document.removeEventListener('visibilitychange', syncOnFocus);
      }
    });
  }
}

// Also try to sync queued workouts on app start
if ('serviceWorker' in navigator && navigator.serviceWorker.controller) {
  navigator.serviceWorker.controller.postMessage('SYNC_NOW');
}

// === WORKOUT EVALUATION ===
async function showWorkoutEvaluation(workoutId, schemaName) {
  try {
    const ev = await api('/api/workouts/' + workoutId + '/evaluation');
    document.getElementById('evalTitle').textContent = 'Workout Evaluatie';
    const prevStr = ev.previous_date ? new Date(ev.previous_date).toLocaleDateString('nl-NL', {day:'numeric',month:'short'}) : null;
    document.getElementById('evalSubtitle').textContent = prevStr ? 'vs ' + prevStr : 'Eerste sessie ' + schemaName;
    document.getElementById('evalSummary').textContent = ev.summary;

    const container = document.getElementById('evalItems');
    container.textContent = '';
    const icons = { up: '\u2191', down: '\u2193', stable: '=', new: '\u2605' };
    ev.deltas.forEach(d => {
      const item = document.createElement('div');
      item.className = 'eval-item';

      const icon = document.createElement('div');
      icon.className = 'eval-icon ' + d.verdict;
      icon.textContent = icons[d.verdict] || '?';
      item.appendChild(icon);

      const name = document.createElement('div');
      name.className = 'eval-name';
      name.textContent = d.exercise_name;
      item.appendChild(name);

      const right = document.createElement('div');
      right.style.textAlign = 'right';
      const detail = document.createElement('div');
      detail.className = 'eval-detail';
      detail.textContent = d.current_best_kg + ' kg \u00d7 ' + d.current_best_reps;
      right.appendChild(detail);

      if (d.verdict !== 'new' && d.kg_change !== null) {
        const change = document.createElement('div');
        change.className = 'eval-change ' + d.verdict;
        const parts = [];
        if (d.kg_change !== 0) parts.push((d.kg_change > 0 ? '+' : '') + d.kg_change + ' kg');
        if (d.reps_change !== 0) parts.push((d.reps_change > 0 ? '+' : '') + d.reps_change + ' reps');
        change.textContent = parts.join(', ') || 'gelijk';
        right.appendChild(change);
      }
      item.appendChild(right);
      container.appendChild(item);
    });

    // Show target updates if available (from cloud save response)
    if (window._lastTargetUpdates && window._lastTargetUpdates.length) {
      const tuDiv = document.createElement('div');
      tuDiv.style.cssText = 'margin-top:16px;padding-top:12px;border-top:1px solid #3a3a3c';
      const tuTitle = document.createElement('div');
      tuTitle.className = 'progress-title';
      tuTitle.textContent = 'TARGETS BIJGEWERKT';
      tuTitle.style.color = '#ff9f0a';
      tuDiv.appendChild(tuTitle);
      window._lastTargetUpdates.forEach(u => {
        const row = document.createElement('div');
        row.className = 'eval-item';
        const icon = document.createElement('div');
        icon.className = 'eval-icon up';
        icon.textContent = u.reason === 'weight_up' ? '\u2b06' : '\u2191';
        row.appendChild(icon);
        const name = document.createElement('div');
        name.className = 'eval-name';
        name.textContent = u.exercise_name + ' (S' + u.set_number + ')';
        row.appendChild(name);
        const detail = document.createElement('div');
        detail.style.textAlign = 'right';
        const from = document.createElement('div');
        from.className = 'eval-detail';
        from.textContent = u.old_kg + 'kg \u00d7 ' + u.old_reps + ' \u2192 ' + u.new_kg + 'kg \u00d7 ' + u.new_reps;
        detail.appendChild(from);
        const reason = document.createElement('div');
        reason.className = 'eval-change up';
        reason.textContent = u.reason === 'weight_up' ? '+gewicht' : u.reason === 'reps_up' ? '+reps' : u.reason === 'kg_up' ? '+kg' : '';
        detail.appendChild(reason);
        row.appendChild(detail);
        tuDiv.appendChild(row);
      });
      container.appendChild(tuDiv);
      window._lastTargetUpdates = null;
    }

    document.getElementById('evalOverlay').classList.add('open');
    progressCache = {}; // clear cache so progress reflects new data
  } catch (e) {
    console.log('Evaluation load failed:', e);
  }
}

function closeEvaluation(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('evalOverlay').classList.remove('open');
}

// === EQUIPMENT ===
let equipmentData = null; // cached from API
let expandedEquip = null;

const EQUIP_TYPES = {
  machine: { label: 'Machines', color: 'green' },
  cable: { label: 'Kabel', color: 'blue' },
  free_weight: { label: 'Vrije Gewichten', color: 'purple' },
  bodyweight: { label: 'Bodyweight', color: 'orange' }
};

async function loadEquipmentData() {
  if (equipmentData) return equipmentData;
  try {
    const [equipment, exercises] = await Promise.all([
      api('/api/equipment'),
      api('/api/exercises')
    ]);
    // Build equipment → exercises map
    const exByEquip = {};
    exercises.forEach(ex => {
      const eqName = ex.equipment ? ex.equipment.name : null;
      if (eqName) {
        if (!exByEquip[eqName]) exByEquip[eqName] = [];
        exByEquip[eqName].push(ex);
      }
    });
    equipmentData = equipment.map(eq => ({
      ...eq,
      exercises: exByEquip[eq.name] || []
    }));
    return equipmentData;
  } catch (e) {
    console.log('Failed to load equipment:', e);
    return [];
  }
}

async function renderEquipment() {
  const container = document.getElementById('equipmentList');
  container.textContent = '';
  const data = await loadEquipmentData();
  if (!data.length) {
    container.textContent = 'Geen apparatuur gevonden.';
    return;
  }
  // Group by type
  const groups = {};
  data.forEach(eq => {
    const t = eq.type || 'other';
    if (!groups[t]) groups[t] = [];
    groups[t].push(eq);
  });
  // Render groups
  Object.entries(EQUIP_TYPES).forEach(([type, cfg]) => {
    const items = groups[type];
    if (!items || !items.length) return;
    const section = document.createElement('div');
    section.className = 'superset ' + cfg.color;
    section.dataset.type = type;
    const header = document.createElement('div');
    header.className = 'superset-header';
    header.textContent = cfg.label;
    const badge = document.createElement('span');
    badge.className = 'badge';
    badge.textContent = items.length + ' items';
    header.appendChild(badge);
    section.appendChild(header);
    items.sort((a, b) => a.name.localeCompare(b.name));
    items.forEach(eq => {
      section.appendChild(buildEquipItem(eq));
    });
    container.appendChild(section);
  });
  expandedEquip = null;
}

function buildEquipItem(eq) {
  const div = document.createElement('div');
  div.className = 'equip-item';
  div.dataset.name = eq.name.toLowerCase();
  div.dataset.exercises = eq.exercises.map(e => e.name.toLowerCase()).join(',');
  const nameRow = document.createElement('div');
  nameRow.className = 'equip-name';
  const nameText = document.createElement('span');
  nameText.textContent = eq.name;
  nameRow.appendChild(nameText);
  if (eq.exercises.length) {
    const count = document.createElement('span');
    count.className = 'equip-count';
    count.textContent = eq.exercises.length + ' oef.';
    nameRow.appendChild(count);
  }
  div.appendChild(nameRow);
  const meta = document.createElement('div');
  meta.className = 'equip-meta';
  const parts = [];
  if (eq.brand) parts.push(eq.brand);
  if (eq.location_hint) parts.push(eq.location_hint);
  meta.textContent = parts.join(' \u2022 ') || '';
  div.appendChild(meta);
  // Exercise detail container (hidden by default)
  const exContainer = document.createElement('div');
  exContainer.className = 'equip-exercises';
  exContainer.style.display = 'none';
  eq.exercises.forEach(ex => {
    const row = document.createElement('div');
    row.className = 'equip-ex-row';
    const info = document.createElement('div');
    const exName = document.createElement('div');
    exName.className = 'equip-ex-name';
    exName.textContent = ex.name;
    const exMuscles = document.createElement('div');
    exMuscles.className = 'equip-ex-muscles';
    exMuscles.textContent = ex.muscles;
    info.appendChild(exName);
    info.appendChild(exMuscles);
    row.appendChild(info);
    // Info button reusing existing modal
    if (EXERCISE_INFO[ex.name]) {
      const infoBtn = document.createElement('button');
      infoBtn.className = 'info-btn';
      infoBtn.textContent = '\u24d8';
      infoBtn.onclick = (e) => { e.stopPropagation(); showExerciseInfo(ex.name); };
      row.appendChild(infoBtn);
    }
    exContainer.appendChild(row);
  });
  div.appendChild(exContainer);
  // Toggle expand
  div.onclick = () => {
    if (expandedEquip && expandedEquip !== div) {
      expandedEquip.classList.remove('expanded');
      expandedEquip.querySelector('.equip-exercises').style.display = 'none';
    }
    const isExpanded = div.classList.toggle('expanded');
    exContainer.style.display = isExpanded ? 'block' : 'none';
    expandedEquip = isExpanded ? div : null;
  };
  return div;
}

function filterEquipment(query) {
  const q = query.toLowerCase().trim();
  document.querySelectorAll('#equipmentList .superset').forEach(section => {
    let sectionVisible = false;
    section.querySelectorAll('.equip-item').forEach(item => {
      const matchName = item.dataset.name.includes(q);
      const matchEx = item.dataset.exercises.includes(q);
      const show = !q || matchName || matchEx;
      item.style.display = show ? '' : 'none';
      if (show) sectionVisible = true;
    });
    section.style.display = sectionVisible ? '' : 'none';
  });
}

// === SHARE ===
function shareWorkout() {
  const w = viewingWorkout;
  if (!w) return;

  const d = new Date(w.date);
  const dateStr = d.toLocaleDateString('nl-NL', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  const schema = getUserSchemas()[w.schema];

  let text = `Workout ${dateStr}\n`;
  text += `${schema.name} (${schema.subtitle})\n`;
  text += '\u2500'.repeat(30) + '\n';

  (w.exercises || []).forEach(logged => {
    const exName = logged.name || 'Unknown';

    if (Array.isArray(logged.sets)) {
      const filledSets = logged.sets.filter(s => s.kg || s.reps);
      if (filledSets.length > 0) {
        text += `${exName}:\n`;
        logged.sets.forEach((s, i) => {
          if (!s.kg && !s.reps) return;
          text += `  S${i+1}: ${s.kg || '—'} kg \u00d7 ${s.reps || '—'} reps\n`;
        });
      }
    } else if (logged.kg || logged.reps) {
      text += `${exName}: ${logged.kg || '—'} kg \u00d7 ${logged.reps || '—'} reps\n`;
    }
  });

  if (w.feedback) {
    text += '\u2500'.repeat(30) + '\n';
    text += `Opmerkingen: ${w.feedback}\n`;
  }

  document.getElementById('sharePreview').textContent = text;
  showView('share');
}

function copyToClipboard() {
  const text = document.getElementById('sharePreview').textContent;
  navigator.clipboard.writeText(text).then(() => {
    showToast('Gekopieerd!');
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Gekopieerd!');
  });
}

// === TOAST ===
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// === REFRESH ===
function doRefresh() {
  window.location.reload(true);
}

// Pull-to-refresh
let ptrStart = 0, ptrPulling = false;
document.addEventListener('touchstart', e => {
  if (window.scrollY === 0 && document.getElementById('home').classList.contains('active')) {
    ptrStart = e.touches[0].clientY;
    ptrPulling = true;
  }
}, { passive: true });

document.addEventListener('touchmove', e => {
  if (!ptrPulling) return;
  const diff = e.touches[0].clientY - ptrStart;
  const ptr = document.getElementById('ptr');
  if (diff > 60 && window.scrollY === 0) {
    ptr.classList.add('visible');
    ptr.textContent = '↑ Laat los om te refreshen';
  } else if (diff > 10 && window.scrollY === 0) {
    ptr.classList.add('visible');
    ptr.textContent = '↓ Pull to refresh';
  } else {
    ptr.classList.remove('visible');
  }
}, { passive: true });

document.addEventListener('touchend', () => {
  const ptr = document.getElementById('ptr');
  if (ptr.classList.contains('visible') && ptr.textContent.includes('Laat los')) {
    ptr.textContent = 'Refreshing...';
    ptr.classList.add('refreshing');
    setTimeout(() => doRefresh(), 300);
  } else {
    ptr.classList.remove('visible');
  }
  ptrPulling = false;
});

// === INIT ===
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    // Listen for sync complete messages
    navigator.serviceWorker.addEventListener('message', e => {
      if (e.data.type === 'SYNC_COMPLETE') {
        showToast(e.data.synced + ' workout(s) gesynct!');
        updateStats();
      }
      if (e.data.type === 'WORKOUT_QUEUED') {
        console.log('Workout queued for offline sync');
      }
    });
  }).catch(() => {});
}

// Migrate old single-user data to joost
if (localStorage.getItem('gym_workouts') && !localStorage.getItem('gym_workouts_joost')) {
  localStorage.setItem('gym_workouts_joost', localStorage.getItem('gym_workouts'));
  localStorage.removeItem('gym_workouts');
}

// Determine user from URL param, fallback to saved user, default to joost
const urlUser = new URLSearchParams(window.location.search).get('user');
if (urlUser && USERS[urlUser]) {
  currentUser = urlUser;
  localStorage.setItem('gym_user', urlUser);
} else {
  const savedUser = localStorage.getItem('gym_user');
  currentUser = (savedUser && USERS[savedUser]) ? savedUser : 'joost';
}

// Auth flow: if token exists, try cloud mode; otherwise show login (or fallback to local)
(async () => {
  if (authToken && authUser) {
    currentUser = authUser.username;
    cloudMode = true;
    try {
      await loadCloudSchemas();
    } catch (e) {
      console.log('Cloud unavailable, using local data');
      cloudMode = false;
    }
    showView('home');
    renderHome();
    updateStats();
  } else {
    // Show login screen, but also prepare fallback
    renderLoginUsers();
    showView('login');
  }
})();
